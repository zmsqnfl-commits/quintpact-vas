name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements-dev.txt
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Install Python test dependencies
        run: python -m pip install -r tests/requirements-dev.txt
      - name: Run Python checks
        run: npm run test:python

  browser:
    name: Playwright checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser checks
        run: npm run test:browser

  windows-runtime:
    name: Windows runtime checks
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run PowerShell 5.1 runtime integration
        run: python tests/test_windows_runtime.py
      - name: Build and smoke-test the extracted Windows release
        run: |
          python scripts/build_release.py
          python tests/test_release_runtime_flow.py

  package:
    name: Release package checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Build and verify release packages
        run: npm run test:package
