name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements-dev.txt
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Require a main-branch release commit
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify tag matches VAS version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="$(python -c "import json; print(json.load(open('package.json', encoding='utf-8'))['version'])")"
          test "$RELEASE_TAG" = "v$version"
      - name: Install test dependencies
        run: |
          python -m pip install -r tests/requirements-dev.txt
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Python checks
        run: npm run test:python
      - name: Run browser checks
        run: npm run test:browser
      - name: Build and verify release packages
        run: npm run test:package
      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          assets=(
            "dist/VAS-${version}-windows.zip"
            "dist/VAS-Client-Form-${version}.zip"
            "dist/release-manifest.json"
            "dist/SHA256SUMS.txt"
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --verify-tag --notes-file "docs/releases/${version}.md" --title "VAS ${version}"
          fi
