<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>VAS 2.6.2 — 내 사용 기록</title><link rel="stylesheet" href="editorial-shell.css"><link rel="stylesheet" href="memory-center.css"></head>
<body>
  <header><a href="vas-hub.html" data-vas-link>← 허브</a><strong>내 사용 기록</strong><span id="memoryState">확인 중</span></header>
  <main>
    <section class="memory-hero"><h1>내가 남긴<br>기록.</h1><div><p>자주 쓰는 기능을 더 편하게 보여주려고 이 컴퓨터에 저장한 기록입니다. 외부로 보내지 않으며 언제든 지울 수 있습니다.</p><div class="hero-actions"><button id="toggleConsent">기록 저장 켜기</button><button id="togglePause">기록 일시정지</button><button id="exportMemory">파일로 저장</button><label class="import-label">저장 파일 불러오기<input id="importMemory" type="file" accept="application/json,.json" hidden></label></div></div></section>
    <section class="summary"><div><span>기록</span><strong id="eventCount">0</strong></div><div><span>보관</span><strong>직접 삭제 전까지</strong></div><div><span>위치</span><strong id="storageLocation">현재 브라우저</strong></div></section>
    <section class="memory-list-section"><div class="section-heading"><h2>사용 기록</h2><div><button type="button" id="toggleScope" hidden>모든 프로젝트 보기</button><label class="vas-sr-only" for="typeFilter">기록 유형</label><select id="typeFilter"><option value="">전체 유형</option></select><button id="deleteAll" class="danger">전체 삭제</button></div></div><div id="memoryList" class="memory-list"></div></section>
  </main>
  <script src="vas-config.js"></script><script src="storage-utils.js"></script><script src="theme-state.js"></script><script src="editorial-theme.js"></script><script src="runtime-client.js"></script><script src="project-context.js"></script><script src="knowledge-index.js"></script><script src="rag-lite.js"></script><script src="personalization-store.js"></script><script src="project-rail.js"></script><script src="memory-center.js"></script>
</body></html>
