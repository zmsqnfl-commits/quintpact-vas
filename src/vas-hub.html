<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAS 2.6.4 — 시작</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23111111%22/><text x=%2250%22 y=%2272%22 font-size=%2275%22 font-family=%22monospace%22 font-weight=%22bold%22 text-anchor=%22middle%22 fill=%22%23ffffff%22>V</text></svg>">
  <link rel="stylesheet" href="editorial-shell.css">
  <link rel="stylesheet" href="setup-tools.css">
  <link rel="stylesheet" href="vas-hub.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="vas-hub.html" data-vas-link>VAS 2.6.4</a>
      <div class="setup-actions" aria-label="도움말">
        <button type="button" data-setup-help>사용 방법</button>
      </div>
    </div>
  </header>

  <main class="hub-shell">
    <section class="hero" data-reveal>
      <div class="hero-copy">
        <h1><span>무엇을</span><span>도와드릴까요?</span></h1>
        <p>새 프로젝트를 시작하거나 기존 프로그램의 AI 작업 지시를 만드세요.</p>
        <span class="hero-signature" aria-hidden="true">VAS / 2.6.4</span>
      </div>

      <h2 id="startTitle" class="sr-only">시작 방식 선택</h2>
      <div class="start-grid" aria-labelledby="startTitle">
        <a class="start-card" href="client-application.html" data-vas-link data-memory-start data-track="project.new">
          <span class="action-index" aria-hidden="true">01</span>
          <span class="start-copy"><strong>새 프로젝트 만들기</strong><small>요구사항과 디자인을 정하고 AI 전달 JSON을 만듭니다.</small></span>
          <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>
        </a>
        <a class="start-card import" href="project-import.html" data-vas-link data-memory-start data-track="project.import">
          <span class="action-index" aria-hidden="true">02</span>
          <span class="start-copy"><strong>기존 프로그램 AI로 연결</strong><small>폴더 위치와 작업을 정리해 코딩 AI용 프롬프트를 만듭니다.</small></span>
          <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>
        </a>
      </div>
    </section>
  </main>

  <script src="vas-config.js"></script>
  <script src="storage-utils.js"></script>
  <script src="runtime-client.js"></script>
  <script src="theme-state.js"></script>
  <script src="editorial-theme.js"></script>
  <script src="personalization-store.js"></script>
  <script src="setup-tools.js"></script>
  <script src="vas-hub.js"></script>
</body>
</html>
