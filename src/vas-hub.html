<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAS 2.5.2 — Agent Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23111111%22/><text x=%2250%22 y=%2272%22 font-size=%2275%22 font-family=%22monospace%22 font-weight=%22bold%22 text-anchor=%22middle%22 fill=%22%23ffffff%22>V</text></svg>">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600;700;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800;900&display=swap');
  
  :root {
    --bg: #f4f4f4;
    --text: #09090b;
    --text-muted: #71717a;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* Header / Typography */
  .header {
    text-align: center;
    padding: 80px 20px 40px;
  }
  .header .label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .header h1 {
    font-size: clamp(60px, 12vw, 180px);
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.04em;
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .header p {
    font-size: 18px;
    color: var(--text-muted);
  }

  /* Grid Layout */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 40px;
  }
  .tool-stack {
    display: grid;
    gap: 44px;
  }
  
  /* Flat Card (Neo-Brutalism) */
  .card-item {
    text-decoration: none;
    color: inherit;
    display: block;
    cursor: pointer;
  }
  .card-canvas {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: #e0e0e0;
    border: 2px solid var(--text);
    overflow: hidden;
    margin-bottom: 20px;
    position: relative;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  /* Adding some brutalist graphic inside the canvas */
  .card-canvas.design { background: #ffcc00; }
  .primary-card .card-canvas { aspect-ratio: 21 / 7; }
  .primary-card .graphic { font-size: clamp(56px, 8vw, 150px); }
  
  /* Brutalist Hover Effect */
  .card-item:hover .card-canvas { 
    transform: translate(-6px, -6px); 
    box-shadow: 8px 8px 0px var(--text); 
  }
  
  .graphic {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-end;
    padding: 8% 8%; text-align: left; line-height: 0.85;
    font-size: clamp(40px, 6.5vw, 120px); font-weight: 900; letter-spacing: -0.05em;
    color: #111; transform: rotate(-8deg) translateY(20px) translateX(-10px); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .card-item:hover .graphic { transform: rotate(0deg) scale(1.08) translateX(0); }
  
  /* Meta Text */
  .card-meta {
    display: flex; align-items: center; gap: 8px; font-size: 16px;
  }
  .card-meta h2 { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
  .card-meta h3 { font-size: 16px; font-weight: 800; letter-spacing: -0.01em; }
  .card-meta .by { font-size: 13px; color: var(--text-muted); font-style: italic; }
  .card-meta .author {
    font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; color: #333;
  }
  .avatar {
    width: 20px; height: 20px; background: #111; color: #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800;
  }

  @media (max-width: 768px) {
    .primary-card .card-canvas { aspect-ratio: 16 / 10; }
  }
</style>
</head>
<body>

  <header class="header">
    <h1>VAS 시스템</h1>
    <p>Vibecoding Agent System</p>
  </header>

  <div class="container">
    <div class="tool-stack">
      
      <a href="design-controller.html" class="card-item primary-card">
        <div class="card-canvas design">
          <div class="graphic">VAS<br>STUDIO</div>
        </div>
        <div class="card-meta">
          <h2>VAS Design Studio (18+ 테마 갤러리 내장)</h2>
          <span class="by">by</span>
          <div class="author"><div class="avatar" style="background:#111;">Q</div> QUINTPACT Team</div>
        </div>
      </a>

    </div>
  </div>

  <script>


    // Apply Global Theme Tokens
    const savedTokens = localStorage.getItem('vasThemeTokens');
    if (savedTokens) {
      try {
        const v = JSON.parse(savedTokens);
        
        // Auto-patch font family to guarantee Pretendard is the main body font with robust system fallback
        const systemFallback = ", system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif";
        const monoFallback = ", ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace";
        
        if (v.fontFamily && v.fontFamily.includes('Geist Mono')) {
           v.fontFamily = "'Pretendard'" + systemFallback;
        } else if (v.fontFamily && !v.fontFamily.includes('Pretendard')) {
           v.fontFamily = v.fontFamily.replace(", sans-serif", ", 'Pretendard'" + systemFallback).replace(", monospace", ", 'Pretendard'" + monoFallback);
        }
        
        document.documentElement.style.setProperty('--bg', v.colors.background);
        document.documentElement.style.setProperty('--text', v.colors.text);
        
        // Update specific brutalist overrides based on the token logic
        const style = document.createElement('style');
        let css = `
          body { font-family: ${v.fontFamily}; }
          .card-canvas { border: ${v.borderWidth}px solid ${v.colors.border}; border-radius: 0; }
        `;
        if(v.colors.border === '#000000' && v.borderWidth >= 3 && v.shadow === 0 && v.radius === 0) {
           // Neo Brutalism
           css += `.card-item:hover .card-canvas { box-shadow: 8px 8px 0px ${v.colors.text}; }`;
        } else {
           // Others
           css += `.card-item:hover .card-canvas { box-shadow: 0 ${v.shadow/2}px ${v.shadow}px rgba(0,0,0,0.15); transform: translateY(-4px) scale(0.98); }`;
        }
        style.textContent = css;
        document.head.appendChild(style);
        
        // Match avatar backgrounds to theme colors
        document.querySelectorAll('.avatar').forEach(a => {
           if(a.textContent === 'V') a.style.background = v.colors.text;
        });
      } catch (e) {}
    }
  </script>
</body>
</html>
